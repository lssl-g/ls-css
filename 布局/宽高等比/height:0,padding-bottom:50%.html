<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<!-- 
  问题描述: 实现一个div垂直居中, 其距离屏幕左右两边各10px, 
  其高度始终是宽度的50%。同时div中有一个文字A，
  文字需要水平垂直居中

  注意点：
  绝对定位下的子元素宽高若设为百分比，是相对父元素的(content + padding)值, 
-->
<style>
  * {
    margin: 0;
    padding: 0;
  }
  .outer_wrapper {
    margin: 0 10px;
    height: 500px;
    background-color: aliceblue;
    display: flex;
    align-items: center;
  }
  .inner_wrapper {
    background-color: red;
    position: relative;
    width: 100%;
    height: 0;
    padding-bottom: 50%;
  }
  .box {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 20px;
  }
</style>
<body>
    <div class="outer_wrapper">
      <div class="inner_wrapper">
        <div class="box">A</div>
      </div>
    </div>
</body>
</html>
